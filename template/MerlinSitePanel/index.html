<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merlin SitePanel</title>
    <link rel="stylesheet" href="panel.css">
</head>
<body>
    <div class="panel-container">
        <header class="panel-header">
            <h1 class="panel-title">⚙ Merlin 管理面板</h1>
            <a href="../Merlinsite/index.html" class="back-link">← 返回主站</a>
        </header>

        <nav class="panel-tabs">
            <button class="panel-tab active" data-panel="projects">📁 作品集</button>
            <button class="panel-tab" data-panel="skills">🎯 技能树</button>
            <button class="panel-tab" data-panel="bio">📝 个人简介</button>
            <button class="panel-tab" data-panel="slides">🖼 幻灯片</button>
            <button class="panel-tab" data-panel="broadcast">📢 公告栏</button>
        </nav>

        <main class="panel-content">

            <!-- 作品集管理 -->
            <section class="panel-section active" id="section-projects">
                <div class="toolbar">
                    <button class="btn btn-primary" onclick="projectManager.add()">+ 添加项目</button>
                    <span class="count">共 <strong id="projectCount">0</strong> 个项目</span>
                </div>
                <div class="list-container" id="projectsList"></div>
            </section>

            <!-- 技能树管理 -->
            <section class="panel-section" id="section-skills">
                <div class="toolbar">
                    <button class="btn btn-primary" onclick="skillManager.add()">+ 添加技能</button>
                    <span class="count">共 <strong id="skillCount">0</strong> 项技能</span>
                </div>
                <div class="list-container" id="skillsList"></div>
            </section>

            <!-- 个人简介管理 -->
            <section class="panel-section" id="section-bio">
                <div class="toolbar">
                    <button class="btn btn-primary" onclick="bioManager.addSection()">+ 添加章节</button>
                    <span class="count">共 <strong id="bioCount">0</strong> 个章节</span>
                </div>
                <div class="list-container" id="bioList"></div>
            </section>

            <!-- 幻灯片管理 -->
            <section class="panel-section" id="section-slides">
                <div class="toolbar">
                    <button class="btn btn-primary" onclick="slideManager.add()">+ 添加幻灯片</button>
                    <span class="count">共 <strong id="slideCount">0</strong> 张幻灯片</span>
                </div>
                <div class="list-container" id="slidesList"></div>
            </section>

            <!-- 公告栏管理 -->
            <section class="panel-section" id="section-broadcast">
                <div class="toolbar">
                    <button class="btn btn-primary" onclick="broadcastManager.add()">+ 添加公告</button>
                    <span class="count">共 <strong id="broadcastCount">0</strong> 条公告</span>
                </div>
                <div class="list-container" id="broadcastList"></div>
            </section>

        </main>
    </div>

    <!-- 通用编辑弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">编辑</h2>
                <button class="modal-close" id="closeModalBtn">&times;</button>
            </div>
            <form class="modal-form" id="modalForm">
                <input type="hidden" id="editIndex" value="-1">
                <input type="hidden" id="editType" value="">
                <div id="modalFields"></div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">保存</button>
                    <button type="button" class="btn btn-secondary" id="cancelBtn">取消</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div class="modal-overlay" id="deleteModalOverlay">
        <div class="modal modal-small">
            <div class="modal-header">
                <h2 class="modal-title">⚠️ 确认删除</h2>
                <button class="modal-close" id="closeDeleteModal">&times;</button>
            </div>
            <p class="delete-message" id="deleteMessage"></p>
            <div class="form-actions">
                <button class="btn btn-danger" id="confirmDeleteBtn">确认删除</button>
                <button class="btn btn-secondary" id="cancelDeleteBtn">取消</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="panel.js"></script>
</body>
</html>
