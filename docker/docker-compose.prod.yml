# ============================================
# Linux 服务器专用 Docker Compose 配置
# ============================================
#
# ⚠️ 此文件专门用于 Linux 服务器部署
#    所有路径已硬编码，无需 .env 文件
#
# 使用方法：
#   docker compose -f docker-compose.prod.yml up -d
#

services:
  web:
    image: nginx:1.25-alpine
    container_name: merlin-website
    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      # Linux 服务器绝对路径（已硬编码）
      - /root/apps/MerlinPersonalWebsite:/usr/share/nginx/html:ro
      # Nginx 配置文件
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

    # 资源限制（适配 2G 内存服务器）
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.25'

    # 健康检查
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # 安全配置
    security_opt:
      - no-new-privileges:true

    # 日志配置
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - merlin-network

networks:
  merlin-network:
    driver: bridge
