version: '3.8'

services:
  web:
    image: nginx:1.25-alpine
    container_name: merlin-website
    restart: unless-stopped
    
    ports:
      - "80:80"
    
    volumes:
      # 挂载网站根目录
      - ..:/usr/share/nginx/html:ro
      # 挂载自定义 Nginx 配置
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    
    # 资源限制（适配 2G 内存服务器）
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.25'
    
    # 健康检查
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # 安全配置
    security_opt:
      - no-new-privileges:true

    # 日志配置
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    
    networks:
      - merlin-network

networks:
  merlin-network:
    driver: bridge
