server {
    listen 80;
    server_name _;

    # 主站根目录
    root /usr/share/nginx/html/template/Merlinsite;
    index index.html;

    # 字符集
    charset utf-8;

    # Gzip 压缩配置
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff2
        font/otf;

    # ==========================================
    # 管理面板路由 - 必须放在通用规则之前！
    # ==========================================
    location /panel/ {
        # 使用 root 而不是 alias（避免路径拼接问题）
        root /usr/share/nginx/html/template;
        index index.html;

        try_files $uri $uri/ /panel/index.html;

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # 管理面板的静态资源（CSS/JS）
    location ~* ^/panel/(.*\.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?|otf|ttf|eot))$ {
        root /usr/share/nginx/html/template;

        # 静态资源缓存策略
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # 主站的静态资源缓存策略
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff2|otf|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 主站的 JavaScript 和 CSS 缓存
    location ~* \.(js|css)$ {
        expires 7d;
        add_header Cache-Control "public";

        if ($request_uri ~* "\.js$") {
            add_header Content-Type "application/javascript; charset=utf-8" always;
        }
        if ($request_uri ~* "\.css$") {
            add_header Content-Type "text/css; charset=utf-8" always;
        }
    }

    # HTML 文件不缓存（确保更新及时）
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    # 主入口 - SPA 路由支持
    location / {
        try_files $uri $uri/ /index.html;

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # 禁止访问隐藏文件（如 .git, .env 等）
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 日志配置
    error_log /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;
}
